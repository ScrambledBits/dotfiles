# Starship prompt configuration
# https://starship.rs/config/

# Format displays username, directory, git, kubernetes, gcloud, terraform
format = """
$username$hostname$directory$git_branch$git_status$kubernetes$gcloud$terraform$cmd_duration
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "at [$hostname](bold yellow) "

[directory]
truncation_length = 3
truncation_symbol = "…/"
format = "in [$path]($style) [$read_only]($read_only_style) "
style = "bold cyan"

[git_branch]
symbol = ""
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold purple"
conflicted = "⚔️ "
ahead = "🏎️ ×${count} "
behind = "🐢 ×${count} "
diverged = "🔱 🏎️ ×${ahead_count} 🐢 ×${behind_count} "
untracked = "🛤️ ×${count} "
stashed = "📦 "
modified = "📝 ×${count} "
staged = "🗃️ ×${count} "
renamed = "📛 ×${count} "
deleted = "🗑️ ×${count} "

[kubernetes]
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) in '
style = "bold cyan"
disabled = false

[gcloud]
symbol = "☁️ "
format = '[$symbol$project]($style) '
style = "bold blue"
disabled = false

[terraform]
symbol = "💠 "
format = '[$symbol$workspace]($style) '
style = "bold 105"
disabled = false

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[time]
disabled = true

# Show battery status when low
[battery]
full_symbol = "🔋"
charging_symbol = "⚡️"
discharging_symbol = "💀"
display = ["docked", "discharging"]
threshold = 20

[[battery.display]]
threshold = 20
style = "bold red"
