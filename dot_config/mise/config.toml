# mise configuration - version manager for multiple tools
# https://mise.jdx.dev/
# Usage: mise install (installs all tools listed here)

[tools]
# Python for teaching and automation
python = "latest"
uv = "latest"   # Replaces poetry + ruff + pip (fast, unified Python toolchain)

# Node.js for slidev and modern tools
node = "latest"

# Go for cloud-native tools
go = "latest"

# Rust (Cargo) for systems programming and tooling
rust = "latest"

# Terraform ecosystem
# NOTE: HashiCorp changed Terraform to BSL license in 2023.
# OpenTofu (MPL 2.0, Linux Foundation) is a compatible alternative:
#   opentofu = "1.9"   # uncomment to switch
terraform = "1.15.0"
terragrunt = "latest"
tflint = "latest"

# Developer tools
fd = "latest"
lazygit = "latest"
delta = "latest"   # Better git diffs (pager)

[settings]
# Automatically install missing tools when entering directories
experimental = true

[env]
# Global environment variables
PYTHONDONTWRITEBYTECODE = "1"
PIP_REQUIRE_VIRTUALENV = "true"

[shell_alias]
tf = "terraform"
tg = "terragrunt"

[tasks.tf-check]
description = "Format check, lint, and validate Terraform in current directory"
run = "terraform fmt -check -recursive && tflint --recursive && terraform validate"

[tasks.tf-docs]
description = "Generate Terraform module documentation"
run = "terraform-docs markdown table --output-file README.md ."

[tasks.k8s-check]
description = "Validate Kubernetes manifests against current schemas"
run = "kubeconform -strict -summary -ignore-missing-schemas ."

[tasks.secrets-check]
description = "Scan repository for leaked secrets"
run = "gitleaks detect --no-banner"
