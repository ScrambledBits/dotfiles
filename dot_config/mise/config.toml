# mise configuration - version manager for multiple tools
# https://mise.jdx.dev/
# Usage: mise install (installs all tools listed here)

[tools]
# Python for teaching and automation
python = "latest"
uv = "latest"   # Replaces poetry + ruff + pip (fast, unified Python toolchain)

# Node.js for slidev and modern tools
# NOTE: Node 20 reaches end-of-maintenance April 2026 — pinned to 24 (Active LTS)
node = "latest"

# Go for cloud-native tools
go = "latest"

# Rust (Cargo) for systems programming and tooling
rust = "latest"

# Terraform ecosystem
# NOTE: HashiCorp changed Terraform to BSL license in 2023.
# OpenTofu (MPL 2.0, Linux Foundation) is a compatible alternative:
#   opentofu = "1.9"   # uncomment to switch
terraform = "latest"
terragrunt = "latest"
tflint = "latest"

# Cloud CLIs
"pipx:awscli" = "latest"   # AWS CLI; pinning to latest acceptable for CLI tools

# Developer tools
fd = "latest"
lazygit = "latest"
delta = "latest"   # Better git diffs (pager)

# SSH & Remote tools
cloudflared = "latest"   # Cloudflare Access tunnel
# mosh = "latest"          # Mobile SSH (requires brew install mosh)
tmux = "latest"          # Terminal multiplexer (already installed via brew)

[settings]
# Automatically install missing tools when entering directories
experimental = true

[env]
# Global environment variables
PYTHONDONTWRITEBYTECODE = "1"
PIP_REQUIRE_VIRTUALENV = "true"

[tool_alias]
# Short names for common tools
tf = "terraform"
tg = "terragrunt"
