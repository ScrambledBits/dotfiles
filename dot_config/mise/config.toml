# mise configuration - version manager for multiple tools
# https://mise.jdx.dev/
# Usage: mise install (installs all tools listed here)

[tools]
# Python for teaching and automation
python = "3.13"
poetry = "2.3"
ruff = "0.15"

# Node.js for slidev and modern tools
# NOTE: Node 20 reaches end-of-maintenance April 2026 — pinned to 24 (Active LTS)
node = "24"

# Go for cloud-native tools
go = "1.26"

# Terraform ecosystem
# NOTE: HashiCorp changed Terraform to BSL license in 2023.
# OpenTofu (MPL 2.0, Linux Foundation) is a compatible alternative:
#   opentofu = "1.9"   # uncomment to switch
terraform = "1.14.7"
terragrunt = "0.99"
tflint = "0.61"

# Cloud CLIs
"pipx:awscli" = "latest"   # AWS CLI; pinning to latest acceptable for CLI tools

# Developer tools
fd = "latest"
lazygit = "latest"

[env]
# Global environment variables
PYTHONDONTWRITEBYTECODE = "1"
PIP_REQUIRE_VIRTUALENV = "true"

[tool_alias]
# Short names for common tools
tf = "terraform"
tg = "terragrunt"
